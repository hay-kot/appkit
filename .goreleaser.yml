version: 2
before:
  hooks:
    - go mod tidy

# This is a library — no binaries to build or archives to publish.
builds:
  - skip: true

release:
  mode: replace

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(\w+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(\w+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(\w+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^ci:"

